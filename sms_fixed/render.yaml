services:
  - type: web
    name: sms-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn student_system.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: sms-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: sms-db
          property: connectionString
  - type: static_site
    name: sms-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sms-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sms-db
    databaseName: sms_db
    user: sms_db_user
